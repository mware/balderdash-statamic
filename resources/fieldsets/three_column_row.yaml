title: 'Three Card Row'
fields:
  -
    handle: card_image
    field:
      max_files: 1
      min_files: 1
      mode: list
      container: assets
      restrict: false
      allow_uploads: true
      show_filename: true
      show_set_alt: true
      type: assets
      display: 'Card Image'
      icon: assets
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
  -
    handle: card_headline
    field:
      input_type: text
      placeholder: 'I am a Headline'
      antlers: false
      type: text
      display: 'Card Headline'
      icon: text
      instructions: 'A short headline'
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
  -
    handle: card_copy
    field:
      antlers: false
      type: textarea
      display: 'Card Copy'
      icon: textarea
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
  -
    handle: card_button
    field:
      type: button_group
      display: 'Card Button'
      icon: button_group
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
